// ═══════════════════════════════════════════
// HEALTH SCORE
// ═══════════════════════════════════════════
function calcHealth(k){
  let s=50;
  if(k.fat>0){
    const m=(k.fat-k.custo)/k.fat;
    s+=m>0.3?20:m>0.15?10:m>0?0:-15;
    const ip=(k.inadimplencia||0)/k.fat;
    s+=ip<0.03?10:ip<0.05?5:ip<0.1?0:-10;
    if(k.meta>0)s+=(k.fat/k.meta)>=1?15:(k.fat/k.meta)>=0.8?5:-10;
  }
  if(k.caixa>0)s+=5;else if(k.caixa<0)s-=15;
  return Math.max(0,Math.min(100,Math.round(s)));
}
function healthColor(s){return s>=75?"#22c55e":s>=50?"#3b82f6":s>=30?"#f59e0b":"#ef4444";}
function healthLabel(s){return s>=75?"Saudável":s>=50?"Estável":s>=30?"Atenção":"Crítico";}

// ═══════════════════════════════════════════
// MINI BAR CHART
// ═══════════════════════════════════════════
function BarChart({data,height=60}){
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{width:"100%",background:d.c||"#3b82f6",borderRadius:"3px 3px 0 0",height:`${(d.v/max)*100}%`,minHeight:d.v>0?2:0,transition:"height .4s"}}/>
          <div style={{fontSize:9,color:"#475569",whiteSpace:"nowrap",overflow:"hidden",maxWidth:"100%",textAlign:"center"}}>{d.l}</div>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════
// USER PROFILE (header)
// ═══════════════════════════════════════════
function UserProfile(){
  const [open,setOpen]=useState(false);
  const [name,setName]=useState(()=>LS.get("orion_name","Maxwell Machado"));
  const [photo,setPhoto]=useState(()=>LS.get("orion_photo",""));
  const [editName,setEditName]=useState(name);
  const [editing,setEditing]=useState(false);
  const ref=useRef();

  const savePhoto=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{setPhoto(ev.target.result);LS.set("orion_photo",ev.target.result);};

  };
  const saveName=()=>{setName(editName);LS.set("orion_name",editName);setEditing(false);};

  return(
    <div style={{position:"relative"}}>
      <button onClick={()=>setOpen(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,background:"#1e293b",border:"1px solid #263347",borderRadius:10,padding:"6px 12px",cursor:"pointer",color:"#f1f5f9"}}>

        </div>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",lineHeight:1.2}}>{name}</div>
          <div style={{fontSize:10,color:"#475569"}}>CEO · Admin</div>
        </div>
        <span style={{fontSize:10,color:"#475569",marginLeft:4}}>▾</span>
      </button>

      {open&&(
        <div style={{position:"absolute",top:52,right:0,background:"#1e293b",border:"1px solid #263347",borderRadius:14,padding:"18px",width:260,zIndex:999,boxShadow:"0 20px 40px #00000066"}} onClick={e=>e.stopPropagation()}>
          <div style={S.lbl}>Perfil</div>

          {/* Foto */}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",cursor:"pointer",flexShrink:0}} onClick={()=>ref.current.click()}>
              {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{name.split(" ").map(w=>w[0]).join("").slice(0,2)}</span>}
            </div>
            <div>
              <button onClick={()=>ref.current.click()} style={{...S.ghost,fontSize:11,padding:"5px 12px"}}>Alterar foto</button>
              <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={savePhoto}/>
            </div>

          {/* Nome */}
          {editing?(
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input style={S.inp} value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveName()} autoFocus/>

}

// ═══════════════════════════════════════════
// ALERTS BELL
// ═══════════════════════════════════════════
function AlertsBell({companies}){
  const [open,setOpen]=useState(false);
  const alerts=useMemo(()=>{
    const list=[];
    const now=new Date();
    companies.forEach(c=>{
      const k=LS.get("orion_kpi_"+c,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0});
      const contracts=LS.get("orion_contracts_"+c,[]);
      if(k.fat>0&&(k.inadimplencia||0)/k.fat>0.05)list.push({type:"danger",msg:`${c}: inadimplência acima de 5%`,icon:"⚠"});
      if(k.meta>0&&k.fat/k.meta<0.8)list.push({type:"warn",msg:`${c}: meta abaixo de 80%`,icon:"⚡"});
      if(k.caixa<0)list.push({type:"danger",msg:`${c}: caixa negativo`,icon:"⚠"});
      contracts.forEach(ct=>{
        if(!ct.vencimento||ct.status==="Encerrado")return;
        const diff=Math.ceil((new Date(ct.vencimento)-now)/(864e5));
        if(diff<=7&&diff>=0)list.push({type:"danger",msg:`Contrato "${ct.nome}" (${c}) vence em ${diff}d`,icon:"📋"});
        else if(diff<=15)list.push({type:"warn",msg:`Contrato "${ct.nome}" (${c}) vence em ${diff}d`,icon:"📋"});
      });
    });
    return list;
  },[companies]);

  const col=alerts.length===0?"#22c55e":alerts.some(a=>a.type==="danger")?"#ef4444":"#f59e0b";

  return(
    <div style={{position:"relative"}}>
      <button onClick={()=>setOpen(v=>!v)} style={{background:"#1e293b",border:`1px solid ${col}33`,borderRadius:9,padding:"8px 12px",cursor:"pointer",position:"relative",color:col,fontSize:16,display:"flex",alignItems:"center",transition:"all .15s"}}>
        🔔
        {alerts.length>0&&<div style={{position:"absolute",top:-4,right:-4,background:col,borderRadius:"50%",width:17,height:17,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",border:"2px solid #0f172a"}}>{alerts.length}</div>}
      </button>
      {open&&(
        <div style={{position:"absolute",top:48,right:0,background:"#1e293b",border:"1px solid #263347",borderRadius:14,padding:"16px",width:320,zIndex:999,boxShadow:"0 20px 40px #00000066"}}>
          <div style={S.lbl}>Alertas Ativos</div>
          {alerts.length===0&&<div style={{fontSize:13,color:"#22c55e"}}>✓ Nenhum alerta no momento</div>}
          {alerts.map((a,i)=>(
            <div key={i} style={{display:"flex",gap:10,marginBottom:8,background:a.type==="danger"?"#ef444411":"#f59e0b11",border:`1px solid ${a.type==="danger"?"#ef444433":"#f59e0b33"}`,borderRadius:9,padding:"9px 12px"}}>
              <span style={{fontSize:13}}>{a.icon}</span>
              <span style={{fontSize:12,color:"#e2e8f0",lineHeight:1.5}}>{a.msg}</span>
            </div>
          ))}
          <button onClick={()=>setOpen(false)} style={{...S.ghost,width:"100%",marginTop:8,fontSize:12}}>Fechar</button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// COMMAND BAR
// ═══════════════════════════════════════════
function CommandBar({companies,areas,onNavigate}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef();

  useEffect(()=>{
    const h=e=>{
      if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setOpen(v=>!v);}
      if(e.key==="Escape")setOpen(false);
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);

  useEffect(()=>{if(open)setTimeout(()=>ref.current?.focus(),50);},[open]);

  const results=useMemo(()=>{
    if(!q.trim())return[];
    const r=[];
    companies.forEach(c=>{
      if(c.toLowerCase().includes(q.toLowerCase()))r.push({label:c,sub:"Empresa",icon:"🏢",action:()=>{onNavigate("workspace",c,null);setOpen(false);setQ("");}});
    });
    companies.forEach(c=>areas.forEach(a=>{
      if(a.toLowerCase().includes(q.toLowerCase())||c.toLowerCase().includes(q.toLowerCase()))
        r.push({label:`${c} → ${a}`,sub:"Workspace",icon:"◈",action:()=>{onNavigate("workspace",c,a);setOpen(false);setQ("");}});
    }));
    return r.slice(0,8);
  },[q,companies,areas]);

  return(
    <>
      <button onClick={()=>setOpen(true)} style={{background:"#1e293b",border:"1px solid #263347",borderRadius:9,padding:"8px 16px",color:"#475569",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,transition:"all .15s"}}>
        <span style={{fontSize:12}}>⌘</span> Busca rápida <span style={{fontSize:11,background:"#263347",padding:"2px 6px",borderRadius:4,color:"#334155"}}>Ctrl+K</span>
      </button>
      {open&&(
        <div style={{position:"fixed",inset:0,background:"#000000aa",zIndex:500,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80}} onClick={()=>{setOpen(false);setQ("");}}>
          <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:16,width:"100%",maxWidth:560,overflow:"hidden",boxShadow:"0 25px 50px #00000088"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderBottom:"1px solid #263347"}}>
              <span style={{fontSize:16,color:"#475569"}}>🔍</span>
              <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar empresa, área, módulo..." style={{...S.inp,border:"none",background:"transparent",fontSize:15,padding:0}}/>
              <span style={{fontSize:11,color:"#334155",background:"#0f172a",padding:"3px 8px",borderRadius:5}}>ESC</span>
            </div>
            {results.length>0?(results.map((r,i)=>(
              <div key={i} onClick={r.action} style={{padding:"12px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #1a2540",transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background="#263347"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14}}>{r.icon}</span>
                  <span style={{fontSize:13,color:"#e2e8f0"}}>{r.label}</span>
                </div>
                <span style={{fontSize:11,color:"#475569",background:"#0f172a",padding:"2px 8px",borderRadius:5}}>{r.sub}</span>
              </div>
            ))):(
              <div style={{padding:"20px",textAlign:"center",color:"#334155",fontSize:13}}>{q?"Nenhum resultado encontrado":"Digite para buscar..."}</div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// KPI PANEL

function KPIPanel({company}){
  const key="orion_kpi_"+company;
  const [kpis,setKpis]=useState(()=>LS.get(key,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0}));
  const save=(k,v)=>{const n={...kpis,[k]:parseFloat(v)||0};setKpis(n);LS.set(key,n);};
  const score=calcHealth(kpis);
  const margem=kpis.fat>0?((kpis.fat-kpis.custo)/kpis.fat*100).toFixed(1):0;
  const pctMeta=kpis.meta>0?Math.min((kpis.fat/kpis.meta)*100,200).toFixed(1):0;
  const inadPct=kpis.fat>0?((kpis.inadimplencia||0)/kpis.fat*100).toFixed(1):0;

  const fields=[
    {k:"fat",l:"Faturamento Mensal",c:"#f1f5f9",icon:"📈"},
    {k:"custo",l:"Custo Total",c:"#ef4444",icon:"📉"},
    {k:"meta",l:"Meta Mensal",c:"#22c55e",icon:"🎯"},
    {k:"clientes",l:"Clientes Ativos",c:"#3b82f6",icon:"👥"},
    {k:"inadimplencia",l:"Inadimplência (R$)",c:"#f59e0b",icon:"⚠"},
    {k:"caixa",l:"Caixa Atual",c:"#a78bfa",icon:"🏦"},
    {k:"pipeline",l:"Pipeline / Funil",c:"#06b6d4",icon:"🔄"},
  ];

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={S.lbl}>Indicadores</div>

      {/* KPI Grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12,marginBottom:20}}>
        {fields.map(({k,l,c,icon})=>(
          <div key={k} style={{...S.card,padding:"16px"}}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:6,display:"flex",alignItems:"center",gap:6}}><span>{icon}</span>{l}</div>
            <input type="number" style={{...S.inp,fontSize:18,fontWeight:700,padding:"6px 10px",color:c,border:"none",background:"transparent"}} value={kpis[k]||""} onChange={e=>save(k,e.target.value)} placeholder="0"/>
            {k==="fat"&&kpis.meta>0&&(
              <div style={{marginTop:6}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:10,color:"#475569"}}>Meta</span>
                  <span style={{fontSize:10,color:parseFloat(pctMeta)>=100?"#22c55e":"#f59e0b",fontWeight:600}}>{pctMeta}%</span>
                </div>
                <div style={{height:4,background:"#0f172a",borderRadius:2}}>
                  <div style={{height:"100%",width:`${Math.min(parseFloat(pctMeta),100)}%`,background:parseFloat(pctMeta)>=100?"#22c55e":"#3b82f6",borderRadius:2,transition:"width .5s"}}/>
                </div>
              </div>
            )}
            {k==="inadimplencia"&&kpis.fat>0&&(
              <div style={{fontSize:10,color:parseFloat(inadPct)>5?"#ef4444":"#22c55e",marginTop:4,fontWeight:500}}>{inadPct}% do faturamento</div>
            )}
          </div>
        ))}

        {/* Métricas calculadas */}
        <div style={{...S.card,padding:"16px",background:"#172554",borderColor:"#1d4ed833"}}>
          <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>📊 Margem Líquida</div>
          <div style={{fontSize:22,fontWeight:700,color:parseFloat(margem)>0?"#22c55e":"#ef4444"}}>{margem}%</div>
          <div style={{fontSize:11,color:"#475569",marginTop:4}}>Resultado: {fmt(kpis.fat-kpis.custo)}</div>
        </div>
      </div>

      {/* Health score bar */}
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={S.lbl}>Health Score</div>
          <HealthBadge score={score}/>
        </div>
        <div style={{height:8,background:"#0f172a",borderRadius:4}}>
          <div style={{height:"100%",width:`${score}%`,background:healthColor(score),borderRadius:4,transition:"width .6s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
          <span style={{fontSize:10,color:"#475569"}}>0 · Crítico</span>
          <span style={{fontSize:10,color:"#475569"}}>100 · Saudável</span>
        </div>
      </div>

      {/* Mini chart */}
      {kpis.fat>0&&(
        <div style={{...S.card,marginTop:12}}>
          <div style={S.lbl}>Comparativo Visual</div>
          <BarChart height={70} data={[
            {l:"Fat.",v:kpis.fat,c:"#3b82f6"},
            {l:"Custo",v:kpis.custo,c:"#ef4444"},
            {l:"Meta",v:kpis.meta,c:"#22c55e"},
            {l:"Caixa",v:Math.max(kpis.caixa,0),c:"#a78bfa"},
            {l:"Pipe.",v:kpis.pipeline,c:"#06b6d4"},
          ]}/>
        </div>
      )}
    </div>
  );
}

// OKR PANEL
// ═══════════════════════════════════════════
function OKRPanel({company}){
  const key="orion_okr_"+company;
  const [okrs,setOkrs]=useState(()=>LS.get(key,[]));
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({objetivo:"",prazo:"",krs:[{desc:"",meta:100,atual:0}]});

  const save=()=>{
    if(!form.objetivo.trim())return;
    const updated=[...okrs,{...form,id:Date.now()}];
    setOkrs(updated);LS.set(key,updated);
    setForm({objetivo:"",prazo:"",krs:[{desc:"",meta:100,atual:0}]});
    setShowForm(false);
  };
  const del=id=>{const u=okrs.filter(o=>o.id!==id);setOkrs(u);LS.set(key,u);};
  const updateKR=(i,f,v)=>setForm(prev=>({...prev,krs:prev.krs.map((k,idx)=>idx===i?{...k,[f]:v}:k)}));
  const pct=okr=>{const t=okr.krs.reduce((s,k)=>s+(Math.min(k.atual,k.meta)/k.meta)*100,0);return Math.round(t/okr.krs.length);};
  const updateActual=(okrId,krIdx,val)=>{
    const u=okrs.map(o=>o.id===okrId?{...o,krs:o.krs.map((k,i)=>i===krIdx?{...k,atual:parseFloat(val)||0}:k)}:o);
    setOkrs(u);LS.set(key,u);
  };

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style={S.lbl}>Objetivos e Resultados</div><div style={{fontSize:18,fontWeight:700}}>OKRs — {company}</div></div>
        <button style={S.btn} onClick={()=>setShowForm(v=>!v)}>+ Objetivo</button>
      </div>

      {showForm&&(
        <div style={{...S.card,marginBottom:16}}>
          <div style={S.lbl}>Novo Objetivo</div>
          <input style={{...S.inp,marginBottom:10}} placeholder="Objetivo..." value={form.objetivo} onChange={e=>setForm(f=>({...f,objetivo:e.target.value}))}/>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input type="date" style={{...S.inp}} value={form.prazo} onChange={e=>setForm(f=>({...f,prazo:e.target.value}))}/>
          </div>
          <div style={S.lbl}>Key Results</div>
          {form.krs.map((kr,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
              <input style={{...S.inp,flex:3}} placeholder={`Key Result ${i+1}`} value={kr.desc} onChange={e=>updateKR(i,"desc",e.target.value)}/>
              <input type="number" style={{...S.inp,flex:1}} placeholder="Meta" value={kr.meta} onChange={e=>updateKR(i,"meta",+e.target.value)}/>
              <input type="number" style={{...S.inp,flex:1}} placeholder="Atual" value={kr.atual} onChange={e=>updateKR(i,"atual",+e.target.value)}/>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button style={{...S.ghost,fontSize:12}} onClick={()=>setForm(f=>({...f,krs:[...f.krs,{desc:"",meta:100,atual:0}]}))}>+ KR</button>
            <div style={{flex:1}}/>
            <button style={S.ghost} onClick={()=>setShowForm(false)}>Cancelar</button>
            <button style={S.btn} onClick={save}>Salvar</button>
          </div>
        </div>
      )}

      {okrs.length===0&&!showForm&&<div style={{fontSize:13,color:"#334155",textAlign:"center",padding:"40px 0"}}>Nenhum OKR definido. Crie seu primeiro objetivo.</div>}
      {okrs.map(okr=>{
        const p=pct(okr);
        const c=p>=80?"#22c55e":p>=50?"#3b82f6":"#f59e0b";
        return(
          <div key={okr.id} style={{...S.card,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:15,fontWeight:600,color:"#f1f5f9"}}>{okr.objetivo}</div>
                {okr.prazo&&<div style={{fontSize:11,color:"#475569",marginTop:2}}>Prazo: {new Date(okr.prazo+"T12:00").toLocaleDateString("pt-BR")}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Badge label={`${p}%`} color={c}/>
                <button style={S.del} onClick={()=>del(okr.id)}>✕</button>
              </div>
            </div>
            <div style={{height:6,background:"#0f172a",borderRadius:3,marginBottom:12}}>
              <div style={{height:"100%",width:`${p}%`,background:c,borderRadius:3,transition:"width .5s"}}/>
            </div>
            {okr.krs.map((kr,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,background:"#0f172a",borderRadius:8,padding:"8px 12px"}}>
                <div style={{flex:1,fontSize:12,color:"#94a3b8"}}>{kr.desc||`Key Result ${i+1}`}</div>
                <input type="number" style={{...S.inp,width:60,fontSize:12,padding:"4px 8px",textAlign:"right"}} value={kr.atual} onChange={e=>updateActual(okr.id,i,e.target.value)}/>
                <span style={{fontSize:11,color:"#475569"}}>/ {kr.meta}</span>
                <span style={{fontSize:11,color:Math.round(kr.atual/kr.meta*100)>=80?"#22c55e":"#f59e0b",fontWeight:600,minWidth:35}}>{Math.round(Math.min(kr.atual,kr.meta)/kr.meta*100)}%</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

function ContractsPanel({company}){

          {alerts.map(a=>(
            <div key={a.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#e2e8f0",marginBottom:4}}>
              <span>{a.nome}</span>
              <Badge label={a.diff<=0?"Vencido":a.diff===1?"Amanhã":`${a.diff} dias`} color={a.diff<=0?"#ef4444":"#f59e0b"}/>
            </div>
          ))}
        </div>
      )}

      {showForm&&(
        <div style={{...S.card,marginBottom:16}}>
          <div style={S.lbl}>Novo Contrato</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Cliente/Fornecedor</div><input style={S.inp} value={form.cliente} onChange={e=>setForm(f=>({...f,cliente:e.target.value}))}/></div>
            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Valor (R$)</div><input type="number" style={S.inp} value={form.valor} onChange={e=>setForm(f=>({...f,valor:e.target.value}))}/></div>
            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Início</div><input type="date" style={S.inp} value={form.inicio} onChange={e=>setForm(f=>({...f,inicio:e.target.value}))}/></div>
            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Vencimento</div><input type="date" style={S.inp} value={form.vencimento} onChange={e=>setForm(f=>({...f,vencimento:e.target.value}))}/></div>
            <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Status</div><select style={S.sel} value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>{CONTRACT_STATUS.map(s=><option key={s}>{s}</option>)}</select></div>

// ═══════════════════════════════════════════
// RISK MAP
// ═══════════════════════════════════════════
function RiskPanel({company}){
  const key="orion_risks_"+company;
  const [risks,setRisks]=useState(()=>LS.get(key,[]));
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({desc:"",prob:1,impact:1,mitigacao:""});

  const save=list=>{setRisks(list);LS.set(key,list);};
  const add=()=>{
    if(!form.desc.trim())return;
    save([...risks,{...form,id:Date.now()}]);
    setForm({desc:"",prob:1,impact:1,mitigacao:""});
    setShowForm(false);
  };
  const score=r=>r.prob*r.impact;
  const ci=r=>{const s=score(r);return s>=12?3:s>=6?2:s>=3?1:0;};

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style={S.lbl}>Gestão de Riscos</div><div style={{fontSize:18,fontWeight:700}}>Mapa de Riscos</div></div>
        <button style={S.btn} onClick={()=>setShowForm(v=>!v)}>+ Risco</button>
      </div>

      {showForm&&(
        <div style={{...S.card,marginBottom:16}}>
          <input style={{...S.inp,marginBottom:10}} placeholder="Descreva o risco..." value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Probabilidade (1-4)</div>
              <select style={S.sel} value={form.prob} onChange={e=>setForm(f=>({...f,prob:+e.target.value}))}>
                {[1,2,3,4].map(v=><option key={v} value={v}>{v} — {RISK_LABELS[v-1]}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Impacto (1-4)</div>
              <select style={S.sel} value={form.impact} onChange={e=>setForm(f=>({...f,impact:+e.target.value}))}>
                {[1,2,3,4].map(v=><option key={v} value={v}>{v} — {RISK_LABELS[v-1]}</option>)}
              </select>
            </div>
          </div>
          <input style={{...S.inp,marginBottom:10}} placeholder="Plano de mitigação..." value={form.mitigacao} onChange={e=>setForm(f=>({...f,mitigacao:e.target.value}))}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.ghost} onClick={()=>setShowForm(false)}>Cancelar</button><button style={S.btn} onClick={add}>Salvar</button></div>
        </div>
      )}

      {[...risks].sort((a,b)=>score(b)-score(a)).map((r,i)=>{
        const idx=ci(r);
        return(
          <div key={r.id||i} style={{...S.card,marginBottom:10,borderLeft:`3px solid ${RISK_COLORS[idx]}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9",marginBottom:4}}>{r.desc}</div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:r.mitigacao?4:0}}>Prob: {r.prob} · Impacto: {r.impact} · Score: {score(r)}</div>
                {r.mitigacao&&<div style={{fontSize:12,color:"#94a3b8"}}>→ {r.mitigacao}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginLeft:12}}>
                <Badge label={RISK_LABELS[idx]} color={RISK_COLORS[idx]}/>
                <button style={S.del} onClick={()=>save(risks.filter(x=>x.id!==r.id))}>✕</button>
              </div>
            </div>
          </div>
        );
      })}
      {risks.length===0&&!showForm&&<div style={{fontSize:13,color:"#334155",textAlign:"center",padding:"40px 0"}}>Nenhum risco mapeado.</div>}
    </div>
  );
}

function CRMPanel({company}){
  const key="orion_crm_"+company;
  const [leads,setLeads]=useState(()=>LS.get(key,[]));
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({nome:"",contato:"",empresa:"",valor:0,etapa:"Lead",canal:"Indicação",obs:""});

  const CANAIS=["Indicação","Instagram","WhatsApp","Email","Site","Evento","Outro"];

  const save=list=>{setLeads(list);LS.set(key,list);};
  const add=()=>{
    if(!form.nome.trim())return;
    save([...leads,{...form,id:Date.now(),data:new Date().toLocaleDateString("pt-BR"),valor:parseFloat(form.valor)||0}]);
    setForm({nome:"",contato:"",empresa:"",valor:0,etapa:"Lead",canal:"Indicação",obs:""});

  };

  const byEtapa=etapa=>leads.filter(l=>l.etapa===etapa);
  const totalPipeline=leads.filter(l=>!["Fechado","Perdido"].includes(l.etapa)).reduce((s,l)=>s+l.valor,0);

  return(

      {/* Resumo */}

        {[{l:"Pipeline Ativo",v:fmt(totalPipeline),c:"#3b82f6"},{l:"Receita Fechada",v:fmt(totalFechado),c:"#22c55e"},{l:"Total de Leads",v:leads.length,c:"#a78bfa"}].map((k,i)=>(
          <div key={i} style={S.card}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:20,fontWeight:700,color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>

      {/* Funil visual */}
      <div style={{display:"flex",gap:8,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
        {ETAPAS.map(etapa=>(
          <div key={etapa} style={{flex:1,minWidth:140}}>
            <div style={{fontSize:11,fontWeight:600,color:ETAPA_COLORS[etapa],marginBottom:8,textAlign:"center",letterSpacing:"1px"}}>{etapa.toUpperCase()} ({byEtapa(etapa).length})</div>
            <div style={{minHeight:80,background:"#0f172a",borderRadius:10,padding:"8px",border:`1px solid ${ETAPA_COLORS[etapa]}33`}}>
              {byEtapa(etapa).map((l,i)=>(
                <div key={l.id||i} style={{background:"#1e293b",borderRadius:8,padding:"8px 10px",marginBottom:6,border:`1px solid #263347`,cursor:"pointer"}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#f1f5f9",marginBottom:2}}>{l.nome}</div>
                  {l.empresa&&<div style={{fontSize:10,color:"#64748b",marginBottom:2}}>{l.empresa}</div>}
                  {l.valor>0&&<div style={{fontSize:11,color:ETAPA_COLORS[etapa],fontWeight:600}}>{fmt(l.valor)}</div>}

      </div>

      {showForm&&(
        <div style={{...S.card,marginBottom:16}}>
          <div style={S.lbl}>Novo Lead</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Nome</div><input style={S.inp} value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))}/></div>
            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Contato</div><input style={S.inp} value={form.contato} onChange={e=>setForm(f=>({...f,contato:e.target.value}))}/></div>

            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Valor (R$)</div><input type="number" style={S.inp} value={form.valor} onChange={e=>setForm(f=>({...f,valor:e.target.value}))}/></div>
            <div><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Etapa</div><select style={S.sel} value={form.etapa} onChange={e=>setForm(f=>({...f,etapa:e.target.value}))}>{ETAPAS.map(s=><option key={s}>{s}</option>)}</select></div>

        </div>

// FILES PANEL
// ═══════════════════════════════════════════
function FilesPanel({company,area}){
  const key=`orion_files_${company}_${area||"geral"}`;
  const [files,setFiles]=useState(()=>LS.get(key,[]).filter(f=>f.name));
  const [dragOver,setDragOver]=useState(false);
  const ref=useRef();

  const saveList=list=>{
    const clean=list.map(f=>({id:f.id,name:f.name,size:f.size,date:f.date,type:f.type||"",url:f.url||""}));
    setFiles(clean);LS.set(key,clean);
  };

  const addFiles=fileList=>{
    const newFiles=Array.from(fileList).map(f=>{
      let url="";
      try{url=URL.createObjectURL(f);}catch{}
      return{id:Date.now()+"_"+Math.random(),name:f.name,size:f.size,date:new Date().toLocaleDateString("pt-BR"),type:f.type||"",url};
    });
    saveList([...files,...newFiles]);
  };

  const getIcon=name=>{
    const ext=name.split(".").pop().toLowerCase();
    if(["pdf"].includes(ext))return{icon:"📄",c:"#ef4444"};
    if(["doc","docx"].includes(ext))return{icon:"📝",c:"#3b82f6"};
    if(["xls","xlsx","csv"].includes(ext))return{icon:"📊",c:"#22c55e"};
    if(["jpg","jpeg","png","webp","heic"].includes(ext))return{icon:"🖼",c:"#a78bfa"};
    if(["txt"].includes(ext))return{icon:"📃",c:"#94a3b8"};
    return{icon:"📎",c:"#64748b"};
  };

  const formatSize=b=>b<1024?`${b}B`:b<1048576?`${(b/1024).toFixed(1)}KB`:`${(b/1048576).toFixed(1)}MB`;

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div style={S.lbl}>Arquivo Digital</div>
          <div style={{fontSize:18,fontWeight:700}}>{company} {area?`· ${area}`:""}</div>
          <div style={{fontSize:12,color:"#475569",marginTop:2}}>Aceita PDF, Word, Excel, Imagem, CSV, TXT</div>
        </div>
        <button style={S.btn} onClick={()=>ref.current.click()}>+ Upload</button>
      </div>

      <input ref={ref} type="file" multiple accept={FILE_ACCEPT} style={{display:"none"}} onChange={e=>addFiles(e.target.files)}/>

      {/* Drop zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);addFiles(e.dataTransfer.files);}}
        onClick={()=>ref.current.click()}
        style={{border:`2px dashed ${dragOver?"#3b82f6":"#263347"}`,borderRadius:14,padding:"32px 20px",textAlign:"center",marginBottom:20,background:dragOver?"#3b82f611":"transparent",cursor:"pointer",transition:"all .2s"}}
      >
        <div style={{fontSize:32,marginBottom:8}}>📁</div>
        <div style={{fontSize:14,color:dragOver?"#3b82f6":"#475569",fontWeight:500}}>Arraste arquivos aqui ou clique para selecionar</div>
        <div style={{fontSize:11,color:"#334155",marginTop:4}}>PDF · Word · Excel · Imagens · CSV · TXT</div>
      </div>

      {/* Aviso de sessão */}
      <div style={{background:"#f59e0b11",border:"1px solid #f59e0b33",borderRadius:9,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#f59e0b"}}>
        ⚠ Os arquivos ficam disponíveis nesta sessão. Para armazenamento permanente, use o MAXXXI Drive integrado.
      </div>

      {files.length===0&&<div style={{fontSize:13,color:"#334155",textAlign:"center",padding:"20px 0"}}>Nenhum arquivo nesta área.</div>}
      {files.map((f,i)=>{
        const {icon,c}=getIcon(f.name);
        return(
          <div key={f.id||i} style={{...S.card,display:"flex",alignItems:"center",gap:12,marginBottom:8,padding:"12px 16px"}}>
            <span style={{fontSize:22,flexShrink:0}}>{icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
              <div style={{fontSize:11,color:"#64748b"}}>{formatSize(f.size)} · {f.date}</div>
            </div>
            {f.url&&<a href={f.url} download={f.name} style={{fontSize:11,color:"#3b82f6",textDecoration:"none",padding:"5px 12px",border:"1px solid #3b82f633",borderRadius:7,flexShrink:0}}>↓ Baixar</a>}
            <button style={{...S.del,flexShrink:0}} onClick={()=>saveList(files.filter((_,j)=>j!==i))}>✕</button>
          </div>
        );
      })}
    </div>
  );
}

function MaxxxiAgent({company,area,companies}){
  const stKey="orion_chat_"+(company||"global")+"_"+(area||"geral");
  const [msgs,setMsgs]=useState(()=>LS.get(stKey,[{role:"ai",text:`Olá! Sou o MAXXXI, motor de inteligência da plataforma ORION.\n\nEstou conectado a todas as informações de ${company||"todas as empresas"} e posso:\n\n• Analisar KPIs e gerar insights\n• Registrar decisões, contratos e riscos\n• Ler e interpretar documentos das pastas\n• Classificar despesas e receitas\n• Gerar relatórios e projeções\n\nComo posso ajudar agora?`}]));
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [action,setAction]=useState("");
  const endRef=useRef();

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const getContext=()=>{
    const ctx={empresa:company,area,empresas:companies};
    if(company){
      ctx.kpis=LS.get("orion_kpi_"+company,{});
      ctx.contratos=LS.get("orion_contracts_"+company,[]).length;
      ctx.riscos=LS.get("orion_risks_"+company,[]).length;
      ctx.decisoes=LS.get("orion_decisions_"+company,[]).length;
      ctx.leads=LS.get("orion_crm_"+company,[]).length;
      const score=calcHealth(ctx.kpis);
      ctx.healthScore=score;
      ctx.healthStatus=healthLabel(score);
    }
    return JSON.stringify(ctx,null,2);
  };

  const send=async()=>{
    const q=input.trim();if(!q||loading)return;
    setInput("");
    const newMsgs=[...msgs,{role:"user",text:q}];
    setMsgs(newMsgs);setLoading(true);setAction("Analisando contexto...");

    const systemPrompt=`Você é o MAXXXI — Motor de Inteligência Executiva da plataforma ORION.

CONTEXTO ATUAL DA PLATAFORMA:
${getContext()}

SUAS CAPACIDADES:
- Analisar dados financeiros e operacionais das empresas
- Interpretar KPIs e gerar diagnósticos executivos
- Classificar despesas e receitas por natureza, banco, projeto
- Identificar riscos e oportunidades
- Gerar relatórios e projeções
- Registrar decisões, contratos e alertas
- Analisar documentos das pastas (extratos, faturas, contratos)
- Provisionar parcelamentos e contas recorrentes
- Calcular margens por projeto e rateio de despesas fixas
- Comparar performance entre empresas e períodos

REGRAS:
- Responda em português, de forma executiva e direta
- Use dados reais do contexto quando disponíveis
- Seja analítico, preciso e orientado a decisão
- Quando identificar problemas, proponha soluções
- Use formatação clara com seções quando a resposta for longa`;

    setTimeout(()=>setAction("Processando dados..."),800);
    setTimeout(()=>setAction("Gerando análise executiva..."),1600);

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2000,
          system:systemPrompt,
          messages:newMsgs.slice(-12).map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text}))
        })
      });
      const data=await res.json();
      const text=data.content?.[0]?.text||"Erro ao processar.";
      const updated=[...newMsgs,{role:"ai",text}];
      setMsgs(updated);LS.set(stKey,updated.slice(-20));
    }catch{
      setMsgs(p=>[...p,{role:"ai",text:"Erro de conexão. Verifique sua internet e tente novamente."}]);
    }
    setLoading(false);setAction("");
  };

  const QUICK_CMDS=[
    "Analise os KPIs desta empresa",
    "Qual é o health score e por quê?",
    "Identifique os principais riscos",
    "Gere um diagnóstico executivo",
    "Compare com o mês anterior",
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* Header do agente */}
      <div style={{background:"#172554",borderRadius:"12px 12px 0 0",padding:"14px 18px",borderBottom:"1px solid #1e3a7a",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:38,height:38,borderRadius:10,background:"#1d4ed8",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <MaxxxiBot size={22} active={true}/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9",letterSpacing:"0.5px"}}>MAXXXI</div>
          <div style={{fontSize:10,color:"#60a5fa"}}>Motor de Inteligência Executiva · {company||"Ecossistema"}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px #22c55e"}}/>
          <span style={{fontSize:10,color:"#22c55e"}}>Online</span>
        </div>
      </div>

      {/* Comandos rápidos */}
      <div style={{padding:"10px 14px",background:"#0f172a",borderBottom:"1px solid #1e293b",display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
        {QUICK_CMDS.map((cmd,i)=>(
          <button key={i} onClick={()=>{setInput(cmd);}} style={{...S.ghost,fontSize:11,padding:"4px 10px",whiteSpace:"nowrap",flexShrink:0,color:"#60a5fa",borderColor:"#1e3a7a"}}>
            {cmd}
          </button>
        ))}
      </div>

      {/* Mensagens */}
      <div className="scroll-y" style={{flex:1,padding:"16px",display:"flex",flexDirection:"column",gap:10,background:"#0f172a"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="ai"&&(
              <div style={{width:28,height:28,borderRadius:8,background:"#172554",display:"flex",alignItems:"center",justifyContent:"center",marginRight:8,flexShrink:0,alignSelf:"flex-end"}}>
                <MaxxxiBot size={16} active={true}/>

            )}

              {m.role==="ai"&&<div style={{fontSize:9,color:"#3b82f6",letterSpacing:"2px",marginBottom:5,fontWeight:600}}>MAXXXI · ORION</div>}
              {m.text}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#172554",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <MaxxxiBot size={16} active={true}/>
            </div>
            <div style={{background:"#1e293b",borderRadius:"14px 14px 14px 4px",padding:"10px 14px",border:"1px solid #263347"}}>
              <div style={{fontSize:11,color:"#3b82f6",marginBottom:4,letterSpacing:"1px"}}>{action}</div>
              <div style={{display:"flex",gap:4}}>
                {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#3b82f6",animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}
              </div>
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {/* Input */}
      <div style={{padding:"12px 14px",borderTop:"1px solid #1e293b",display:"flex",gap:8,background:"#0f172a",flexShrink:0}}>

        <button style={{...S.btn,padding:"10px 16px",minWidth:46,fontSize:16}} onClick={send} disabled={loading}>↑</button>
      </div>
    </div>
  );
}

            {l:"Faturamento",v:fmt(kpis.fat),c:"#f1f5f9"},
            {l:"Resultado",v:fmt(kpis.fat-kpis.custo),c:kpis.fat-kpis.custo>=0?"#22c55e":"#ef4444"},
            {l:"Meta",v:`${pct}%`,c:parseFloat(pct)>=100?"#22c55e":parseFloat(pct)>=80?"#f59e0b":"#ef4444"},
            {l:"Margem Líquida",v:`${margem}%`,c:parseFloat(margem)>20?"#22c55e":parseFloat(margem)>10?"#f59e0b":"#ef4444"},
            {l:"Clientes",v:kpis.clientes||"—",c:"#f1f5f9"},
            {l:"Caixa",v:fmt(kpis.caixa),c:kpis.caixa>=0?"#22c55e":"#ef4444"},
          ].map((k,i)=>(
            <div key={i} style={{background:"#0f172a",borderRadius:10,padding:"12px 16px"}}>
              <div style={{fontSize:10,color:"#64748b",marginBottom:4,letterSpacing:"1px"}}>{k.l.toUpperCase()}</div>
              <div style={{fontSize:18,fontWeight:700,color:k.c}}>{k.v}</div>
            </div>
          ))}
        </div>

        {/* Contratos ativos */}
        {contracts.filter(c=>c.status==="Ativo"||c.status==="A vencer").length>0&&(
          <div style={{marginBottom:16}}>
            <div style={S.lbl}>Contratos Ativos ({contracts.filter(c=>c.status==="Ativo"||c.status==="A vencer").length})</div>
            {contracts.filter(c=>c.status==="Ativo"||c.status==="A vencer").slice(0,3).map((c,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#94a3b8",marginBottom:4,background:"#0f172a",borderRadius:8,padding:"8px 12px"}}>
                <span>{c.nome}</span>
                <Badge label={c.status} color={STATUS_COLORS[c.status]}/>
              </div>
            ))}
          </div>
        )}

        {/* Riscos altos */}
        {risks.filter(r=>r.prob*r.impact>=6).length>0&&(
          <div style={{marginBottom:16}}>
            <div style={S.lbl}>Riscos Elevados</div>
            {risks.filter(r=>r.prob*r.impact>=6).slice(0,3).map((r,i)=>(
              <div key={i} style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:8,padding:"8px 12px",marginBottom:6,fontSize:13,color:"#fca5a5"}}>{r.desc}</div>
            ))}
          </div>
        )}

        {/* Pipeline CRM */}
        {leads.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={S.lbl}>Pipeline CRM ({leads.filter(l=>!["Fechado","Perdido"].includes(l.etapa)).length} ativos)</div>
            <div style={{fontSize:13,color:"#94a3b8"}}>Total em negociação: {fmt(leads.filter(l=>!["Fechado","Perdido"].includes(l.etapa)).reduce((s,l)=>s+l.valor,0))}</div>
          </div>
        )}

        {/* Última decisão */}
        {decisions.length>0&&(
          <div style={{marginBottom:20}}>
            <div style={S.lbl}>Última Decisão</div>
            <div style={{background:"#0f172a",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#94a3b8"}}>
              <div style={{fontWeight:600,color:"#f1f5f9",marginBottom:2}}>{decisions[0].decisao}</div>
              <div style={{fontSize:11,color:"#475569"}}>{decisions[0].data}</div>
            </div>
          </div>
        )}

        <button style={{...S.btn,width:"100%"}} onClick={onClose}>Fechar Briefing</button>
      </div>
    </div>
  );
}

// CONSOLIDATED CEO VIEW
// ═══════════════════════════════════════════
function ConsolidatedView({companies,onSelectCompany}){
  const allData=companies.map(c=>{
    const k=LS.get("orion_kpi_"+c,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0});
    return{company:c,kpis:k,score:calcHealth(k)};
  });
  const totalFat=allData.reduce((s,d)=>s+d.kpis.fat,0);
  const totalRes=allData.reduce((s,d)=>s+(d.kpis.fat-d.kpis.custo),0);
  const totalCli=allData.reduce((s,d)=>s+d.kpis.clientes,0);
  const avgScore=Math.round(allData.reduce((s,d)=>s+d.score,0)/allData.length);

  return(
    <div className="fade-in">
      <div style={S.lbl}>Visão CEO · Ecossistema Consolidado</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:20}}>Performance do Ecossistema</div>

      {/* Totais */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
        {[
          {l:"Faturamento Total",v:fmt(totalFat),c:"#3b82f6",icon:"📈"},
          {l:"Resultado Consolidado",v:fmt(totalRes),c:totalRes>=0?"#22c55e":"#ef4444",icon:"💰"},
          {l:"Clientes Totais",v:totalCli,c:"#a78bfa",icon:"👥"},
          {l:"Score Médio",v:avgScore,c:healthColor(avgScore),icon:"❤"},
        ].map((k,i)=>(
          <div key={i} style={{...S.card,background:"#172554",borderColor:"#1e3a7a"}}>
            <div style={{fontSize:20,marginBottom:6}}>{k.icon}</div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:22,fontWeight:700,color:k.c}}>{k.v}</div>
          </div>
        ))}
      </div>

      {/* Por empresa */}
      <div style={S.lbl}>Performance por Empresa</div>
      {allData.sort((a,b)=>b.score-a.score).map(({company,kpis,score})=>{
        const color=healthColor(score);
        const pct=kpis.meta>0?Math.min((kpis.fat/kpis.meta)*100,100):0;
        return(
          <div key={company} style={{...S.card,marginBottom:10,cursor:"pointer"}} onClick={()=>onSelectCompany(company)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>{company}</div>
                <div style={{fontSize:12,color:"#64748b"}}>Fat: {fmt(kpis.fat)} · Resultado: {fmt(kpis.fat-kpis.custo)}</div>
              </div>
              <HealthBadge score={score}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:10}}>
              {[
                {l:"Caixa",v:fmt(kpis.caixa),c:kpis.caixa>=0?"#22c55e":"#ef4444"},
                {l:"Pipeline",v:fmt(kpis.pipeline),c:"#a78bfa"},
                {l:"Clientes",v:kpis.clientes||0,c:"#f1f5f9"},
                {l:"Inadimp.",v:kpis.fat>0?fmtPct((kpis.inadimplencia||0)/kpis.fat*100):"—",c:(kpis.inadimplencia||0)/Math.max(kpis.fat,1)>0.05?"#ef4444":"#22c55e"},
              ].map((m,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#475569",marginBottom:2}}>{m.l}</div>
                  <div style={{fontSize:13,fontWeight:600,color:m.c}}>{m.v}</div>
                </div>
              ))}
            </div>
            <div style={{height:4,background:"#0f172a",borderRadius:2}}>
              <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width .5s"}}/>
            </div>
            <div style={{fontSize:10,color:"#475569",marginTop:4,textAlign:"right"}}>{pct.toFixed(0)}% da meta</div>
          </div>
        );
      })}
    </div>
  );
}

// PERSONAL FINANCE
// ═══════════════════════════════════════════
function PersonalFinance(){
  const now=new Date();
  const [mes,setMes]=useState(now.getMonth());
  const [ano,setAno]=useState(now.getFullYear());
  const [entries,setEntries]=useState(()=>LS.get("orion_personal_entries",[]));
  const [form,setForm]=useState({tipo:"despesa",desc:"",valor:"",cat:CATS[0]});
  const [showForm,setShowForm]=useState(false);

  const save=list=>{setEntries(list);LS.set("orion_personal_entries",list);};
  const key=`${ano}-${mes}`;
  const filtered=entries.filter(e=>e.key===key);
  const totalR=filtered.filter(e=>e.tipo==="receita").reduce((s,e)=>s+e.valor,0);
  const totalD=filtered.filter(e=>e.tipo==="despesa").reduce((s,e)=>s+e.valor,0);
  const catTotals={};CATS.forEach(c=>{catTotals[c]=filtered.filter(e=>e.tipo==="despesa"&&e.cat===c).reduce((s,e)=>s+e.valor,0);});
  const catMax=Math.max(...Object.values(catTotals),1);

  const add=()=>{
    const v=parseFloat((form.valor||"").toString().replace(",","."));
    if(!form.desc.trim()||isNaN(v)||v<=0)return;
    save([...entries,{id:Date.now(),key,tipo:form.tipo,desc:form.desc.trim(),valor:v,cat:form.cat,date:new Date().toLocaleDateString("pt-BR")}]);
    setForm(f=>({...f,desc:"",valor:""}));setShowForm(false);
  };

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style={S.lbl}>Gestão Pessoal</div><div style={{fontSize:18,fontWeight:700}}>Finanças Pessoais</div></div>
        <div style={{display:"flex",gap:8}}>
          <select value={mes} onChange={e=>setMes(+e.target.value)} style={{...S.sel,width:"auto"}}>{MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
          <select value={ano} onChange={e=>setAno(+e.target.value)} style={{...S.sel,width:"auto"}}>{[2023,2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select>
          <button style={S.btn} onClick={()=>setShowForm(v=>!v)}>+ Lançamento</button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[{l:"Receitas",v:totalR,c:"#22c55e"},{l:"Despesas",v:totalD,c:"#ef4444"},{l:"Saldo",v:totalR-totalD,c:totalR-totalD>=0?"#22c55e":"#ef4444"}].map((k,i)=>(
          <div key={i} style={S.card}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{k.l} — {MESES_FULL[mes]}</div>
            <div style={{fontSize:22,fontWeight:700,color:k.c}}>{fmt(k.v)}</div>
          </div>
        ))}
      </div>

      {CATS.filter(c=>catTotals[c]>0).length>0&&(
        <div style={{...S.card,marginBottom:20}}>
          <div style={S.lbl}>Despesas por Categoria</div>
          {CATS.filter(c=>catTotals[c]>0).map((c,i)=>(
            <div key={c} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{c}</span>
                <span style={{fontSize:12,color:"#f59e0b",fontWeight:600}}>{fmt(catTotals[c])}</span>
              </div>
              <div style={{height:4,background:"#0f172a",borderRadius:2}}>
                <div style={{height:"100%",width:`${(catTotals[c]/catMax)*100}%`,background:"#f59e0b",borderRadius:2,transition:"width .4s"}}/>
              </div>
            </div>
          ))}
        </div>
      )}

      {showForm&&(
        <div style={{...S.card,marginBottom:16}}>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {["receita","despesa"].map(t=>(
              <button key={t} onClick={()=>setForm(f=>({...f,tipo:t}))} style={{flex:1,background:form.tipo===t?"linear-gradient(135deg,#1d4ed8,#3b82f6)":"#0f172a",border:`1px solid ${form.tipo===t?"#3b82f6":"#1e293b"}`,borderRadius:8,padding:"8px",color:form.tipo===t?"#fff":"#475569",fontSize:13,fontWeight:600,cursor:"pointer",textTransform:"capitalize"}}>{t}</button>
            ))}
          </div>
          <input style={{...S.inp,marginBottom:10}} placeholder="Descrição..." value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input style={S.inp} placeholder="Valor R$..." value={form.valor} onChange={e=>setForm(f=>({...f,valor:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&add()}/>
            {form.tipo==="despesa"&&<select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} style={{...S.sel,flex:1}}>{CATS.map(c=><option key={c}>{c}</option>)}</select>}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={S.ghost} onClick={()=>setShowForm(false)}>Cancelar</button><button style={S.btn} onClick={add}>Salvar</button></div>
        </div>
      )}

      {filtered.length===0&&!showForm&&<div style={{fontSize:13,color:"#334155",textAlign:"center",padding:"30px 0"}}>Nenhum lançamento em {MESES_FULL[mes]} {ano}</div>}
      {filtered.map((e,i)=>(
        <div key={e.id||i} style={{...S.card,display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"10px 14px"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:e.tipo==="receita"?"#22c55e":"#ef4444",flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:"#f1f5f9"}}>{e.desc}</div>
            {e.tipo==="despesa"&&<span style={{fontSize:10,color:"#64748b",background:"#0f172a",padding:"1px 6px",borderRadius:4}}>{e.cat}</span>}
          </div>
          <span style={{fontSize:13,fontWeight:700,color:e.tipo==="receita"?"#22c55e":"#ef4444"}}>{e.tipo==="receita"?"+":"-"}{fmt(e.valor)}</span>
          <button style={S.del} onClick={()=>save(entries.filter((_,j)=>j!==i))}>✕</button>
        </div>
      ))}
    </div>
  );
}

function CompanyCard({name,hov,logoUrl,onSelect,onDelete,onLogoUpload,onBriefing,isActive}){
  const ref=useRef();
  const kpis=LS.get("orion_kpi_"+name,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0});
  const score=calcHealth(kpis);
  const color=healthColor(score);
  const pct=kpis.meta>0?Math.min((kpis.fat/kpis.meta)*100,100):0;

  return(
    <div onClick={onSelect} style={{background:isActive?"#172554":hov?"#1e293b":"#131f35",border:`1px solid ${isActive?"#3b82f6":hov?"#334155":"#1e293b"}`,borderRadius:12,padding:"14px 16px",cursor:"pointer",transition:"all .15s",position:"relative",borderLeft:isActive?"3px solid #3b82f6":hov?"3px solid #334155":"3px solid transparent"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <div onClick={e=>{e.stopPropagation();ref.current.click();}} style={{width:36,height:36,borderRadius:10,background:"#0f172a",border:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",cursor:"pointer",flexShrink:0}}>
          {logoUrl?<img src={logoUrl} style={{width:"100%",height:"100%",objectFit:"contain"}} alt=""/>:<span style={{fontSize:9,color:"#334155"}}>LOGO</span>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:isActive?"#93c5fd":"#f1f5f9",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
          <div style={{fontSize:10,color,marginTop:1}}>{healthLabel(score)} · {score}</div>
        </div>
      </div>
      <div style={{height:3,background:"#0f172a",borderRadius:2,marginBottom:8}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width .5s"}}/>
      </div>
      {kpis.fat>0&&<div style={{fontSize:11,fontWeight:600,color:isActive?"#60a5fa":"#64748b"}}>{fmt(kpis.fat)}</div>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
        <button style={{background:isActive?"#1d4ed822":"#0f172a",border:`1px solid ${isActive?"#3b82f633":"#1e293b"}`,borderRadius:6,padding:"3px 8px",color:isActive?"#60a5fa":"#475569",fontSize:10,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onBriefing();}}>BRIEF</button>
        <button style={{...S.del,fontSize:12}} onClick={e=>{e.stopPropagation();onDelete();}}>✕</button>
      </div>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onClick={e=>e.stopPropagation()} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onLogoUpload(ev.target.result);r.readAsDataURL(f);e.target.value="";}}/>
    </div>
  );
}

                logoUrl={logoMap[c]}
                onSelect={()=>selectCompany(c)}
                onDelete={()=>{setCompanies(companies.filter(x=>x!==c));if(selCompany===c){setSelCompany(null);setScreen("home");}}}
                onLogoUpload={url=>setLogoMap(p=>({...p,[c]:url}))}
                onBriefing={()=>setBriefingCompany(c)}
              />
              <div style={{height:4}}/>
            </div>
          ))}

          {/* Add company */}
          {showAddC?(
            <div style={{marginBottom:8}}>
              <input autoFocus style={{...S.inp,marginBottom:6,fontSize:13}} placeholder="Nome da empresa..." value={newC} onChange={e=>setNewC(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCompany()}/>
              <div style={{display:"flex",gap:6}}>
                <button style={{...S.btn,flex:1,fontSize:12,padding:"7px"}} onClick={addCompany}>Adicionar</button>
                <button style={{...S.ghost,fontSize:12,padding:"7px 12px"}} onClick={()=>{setShowAddC(false);setNewC("");}}>✕</button>
              </div>
            </div>
          ):(
            <div onClick={()=>setShowAddC(true)} style={{border:"1px dashed #1e293b",borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:"#334155",fontSize:12,marginBottom:8,transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#334155";e.currentTarget.style.color="#475569";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.color="#334155";}}>
              <span style={{fontSize:16}}>+</span> Nova empresa
            </div>
          )}

          {/* Separator */}
          <div style={{height:1,background:"#1e293b",margin:"8px 0"}}/>

          {/* Gestão Pessoal */}
          <div onClick={()=>{setSelCompany(null);setScreen("personal");}} style={{background:screen==="personal"?"#172554":"transparent",border:`1px solid ${screen==="personal"?"#1e3a7a":"transparent"}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:screen==="personal"?"#60a5fa":"#475569",fontSize:12,marginBottom:4,transition:"all .15s"}}>
            <span>👤</span> Gestão Pessoal
          </div>

          {/* Visão CEO */}
          <div onClick={()=>{setSelCompany(null);setScreen("ceo");}} style={{background:screen==="ceo"?"#172554":"transparent",border:`1px solid ${screen==="ceo"?"#1e3a7a":"transparent"}`,borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:screen==="ceo"?"#60a5fa":"#475569",fontSize:12,marginBottom:4,transition:"all .15s"}}>
            <span>📊</span> Visão CEO
          </div>

          <div style={{height:8}}/>
        </div>

        {/* MAXXXI na sidebar */}
        <div style={{padding:"10px 12px",borderTop:"1px solid #1e293b"}}>
          <div onClick={()=>{if(selCompany)navigate("workspace",selCompany,"maxxxi");else navigate("maxxxi_global",null,null);}} style={{background:"#172554",border:"1px solid #1e3a7a",borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"all .15s"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#1d4ed8",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <MaxxxiBot size={16} active={true}/>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#93c5fd"}}>MAXXXI</div>
              <div style={{fontSize:9,color:"#3b82f6"}}>Agente IA · Online</div>
            </div>
            <div style={{marginLeft:"auto",width:7,height:7,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 6px #22c55e"}}/>
          </div>
        </div>
      </div>

      {/* ══════════════════════ MAIN AREA ══════════════════════ */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* HEADER */}
        <div style={{background:"#0a1021",borderBottom:"1px solid #1e293b",padding:"12px 28px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>

          {/* Breadcrumb */}
          <div style={{flex:1,display:"flex",alignItems:"center",gap:6,fontSize:13}}>
            <span style={{cursor:"pointer",color:"#475569",fontWeight:500}} onClick={()=>{setSelCompany(null);setScreen("home");}}>ORION</span>
            {selCompany&&<><span style={{color:"#1e293b"}}>›</span><span style={{cursor:screen==="workspace"?"pointer":"default",color:screen==="workspace"?"#60a5fa":"#94a3b8",fontWeight:600}}>{selCompany}</span></>}
            {screen==="personal"&&<><span style={{color:"#1e293b"}}>›</span><span style={{color:"#94a3b8",fontWeight:600}}>Gestão Pessoal</span></>}
            {screen==="ceo"&&<><span style={{color:"#1e293b"}}>›</span><span style={{color:"#94a3b8",fontWeight:600}}>Visão CEO</span></>}
            {screen==="maxxxi_global"&&<><span style={{color:"#1e293b"}}>›</span><span style={{color:"#60a5fa",fontWeight:600}}>MAXXXI IA</span></>}
          </div>

          {/* Faixa KPIs rápidos da empresa ativa */}
          {selCompany&&screen==="workspace"&&(()=>{
            const k=LS.get("orion_kpi_"+selCompany,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0});
            const score=calcHealth(k);
            return(
              <div style={{display:"flex",alignItems:"center",gap:1,background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",padding:"6px 16px",gap:16}}>
                {[
                  {l:"Fat",v:fmt(k.fat),c:"#f1f5f9"},
                  {l:"Result",v:fmt(k.fat-k.custo),c:k.fat-k.custo>=0?"#22c55e":"#ef4444"},
                  {l:"Score",v:score,c:healthColor(score)},
                  {l:"Meta",v:k.meta>0?`${((k.fat/k.meta)*100).toFixed(0)}%`:"—",c:k.meta>0&&k.fat/k.meta>=0.8?"#22c55e":"#f59e0b"},
                ].map((m,i)=>(
                  <div key={i} style={{textAlign:"center"}}>
                    <div style={{fontSize:14,fontWeight:700,color:m.c,lineHeight:1}}>{m.v}</div>
                    <div style={{fontSize:9,color:"#334155",marginTop:2}}>{m.l}</div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Drive dinâmico */}
          <a href={driveUrl} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"#1e293b",border:"1px solid #263347",borderRadius:9,padding:"8px 14px",color:"#94a3b8",fontSize:12,textDecoration:"none",letterSpacing:"0.5px",transition:"all .15s"}}>
            <svg width="14" height="14" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
              <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
              <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
              <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
              <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
              <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
              <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
            </svg>
            {selCompany?"Drive · "+selCompany:"ORION Drive"}
          </a>

          <CommandBar companies={companies} areas={areas} onNavigate={navigate}/>
          <AlertsBell companies={companies}/>
          <UserProfile/>
        </div>

        {/* CONTENT AREA */}
        <div className="scroll-y" style={{flex:1,padding:"24px 28px"}}>

          {/* HOME */}
          {screen==="home"&&(
            <div className="fade-in">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:24}}>
                <div>
                  <div style={{fontSize:11,letterSpacing:"3px",color:"#334155",marginBottom:6}}>BOM DIA, MAXWELL</div>
                  <div style={{fontSize:26,fontWeight:800,color:"#f1f5f9",letterSpacing:"-0.5px"}}>Qual empresa vamos trabalhar agora?</div>
                  <div style={{fontSize:13,color:"#475569",marginTop:4}}>{todayFmt}</div>
                </div>
                <button onClick={()=>setScreen("ceo")} style={{...S.ghost,fontSize:12,display:"flex",alignItems:"center",gap:8}}>
                  <span>📊</span> Visão CEO Consolidada
                </button>
              </div>

              {/* Resumo rápido do ecossistema */}
              {(()=>{
                const allData=companies.map(c=>({c,k:LS.get("orion_kpi_"+c,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0})}));
                const totalFat=allData.reduce((s,d)=>s+d.k.fat,0);
                const totalRes=allData.reduce((s,d)=>s+(d.k.fat-d.k.custo),0);
                const avgScore=Math.round(allData.reduce((s,d)=>s+calcHealth(d.k),0)/allData.length);
                return(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:28}}>
                    {[
                      {l:"Faturamento do Ecossistema",v:fmt(totalFat),c:"#3b82f6",sub:"Total consolidado"},
                      {l:"Resultado Líquido",v:fmt(totalRes),c:totalRes>=0?"#22c55e":"#ef4444",sub:"Receita − Custo"},
                      {l:"Health Score Médio",v:avgScore,c:healthColor(avgScore),sub:healthLabel(avgScore)+" · Ecossistema"},
                    ].map((k,i)=>(
                      <div key={i} style={{...S.card,background:"#131f35",borderColor:"#1e3a5f"}}>
                        <div style={{fontSize:11,color:"#475569",marginBottom:4}}>{k.l}</div>
                        <div style={{fontSize:24,fontWeight:800,color:k.c}}>{k.v}</div>
                        <div style={{fontSize:11,color:"#334155",marginTop:4}}>{k.sub}</div>
                      </div>
                    ))}
                  </div>
                );
              })()}

              {/* Grid empresas */}
              <div style={{fontSize:10,letterSpacing:"2px",color:"#334155",marginBottom:12}}>SELECIONE UMA EMPRESA</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
                {companies.map(c=>(
                  <div key={c} style={{...S.card,cursor:"pointer",transition:"all .15s",background:hovC===c?"#1e293b":"#131f35",borderColor:hovC===c?"#334155":"#1a2540"}} onClick={()=>selectCompany(c)} onMouseEnter={()=>setHovC(c)} onMouseLeave={()=>setHovC(null)}>
                    {(()=>{
                      const k=LS.get("orion_kpi_"+c,{fat:0,custo:0,meta:0,clientes:0,inadimplencia:0,caixa:0,pipeline:0});
                      const score=calcHealth(k);
                      const color=healthColor(score);
                      const pct=k.meta>0?Math.min((k.fat/k.meta)*100,100):0;
                      const margem=k.fat>0?((k.fat-k.custo)/k.fat*100).toFixed(1):null;
                      const metaStatus=k.meta>0&&k.fat/k.meta>=1?"#22c55e":k.meta>0&&k.fat/k.meta>=0.8?"#f59e0b":"#ef4444";
                      return(
                        <>
                          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                            <div style={{width:44,height:44,borderRadius:12,background:"#0f172a",border:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
                              {logoMap[c]?<img src={logoMap[c]} style={{width:"100%",height:"100%",objectFit:"contain"}} alt=""/>:<span style={{fontSize:10,color:"#334155"}}>LOGO</span>}
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{c}</div>
                              <div style={{fontSize:11,color,marginTop:2}}>{healthLabel(score)}</div>
                            </div>
                            <HealthBadge score={score} size={32}/>
                          </div>
                          <div style={{height:4,background:"#0f172a",borderRadius:2,marginBottom:12}}>
                            <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width .5s"}}/>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                            <div style={{background:"#0f172a",borderRadius:8,padding:"8px 10px"}}>
                              <div style={{fontSize:9,color:"#334155",marginBottom:2}}>Faturamento</div>
                              <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{fmt(k.fat)}</div>
                            </div>
                            <div style={{background:"#0f172a",borderRadius:8,padding:"8px 10px"}}>
                              <div style={{fontSize:9,color:"#334155",marginBottom:2}}>Margem</div>
                              <div style={{fontSize:13,fontWeight:700,color:margem&&parseFloat(margem)>0?"#22c55e":"#ef4444"}}>{margem?`${margem}%`:"—"}</div>
                            </div>
                            <div style={{background:"#0f172a",borderRadius:8,padding:"8px 10px"}}>
                              <div style={{fontSize:9,color:"#334155",marginBottom:2}}>% Meta</div>
                              <div style={{fontSize:13,fontWeight:700,color:k.meta>0?metaStatus:"#475569"}}>{k.meta>0?`${((k.fat/k.meta)*100).toFixed(0)}%`:"—"}</div>
                            </div>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
                            <button style={{background:"#172554",border:"1px solid #1e3a7a",borderRadius:7,padding:"4px 12px",color:"#60a5fa",fontSize:11,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setBriefingCompany(c);}}>BRIEF</button>
                            <span style={{fontSize:11,color:"#334155"}}>Clique para abrir →</span>
                          </div>
                        </>
                      );
                    })()}
                  </div>
                ))}

                {/* Gestão Pessoal */}
                <div style={{...S.card,cursor:"pointer",background:hovC==="personal"?"#1e293b":"#131f35",borderColor:hovC==="personal"?"#334155":"#1a2540",borderStyle:"dashed"}} onClick={()=>setScreen("personal")} onMouseEnter={()=>setHovC("personal")} onMouseLeave={()=>setHovC(null)}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                    <div style={{width:44,height:44,borderRadius:12,background:"#172554",border:"1px solid #1e3a7a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👤</div>
                    <div>
                      <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>Gestão Pessoal</div>
                      <div style={{fontSize:11,color:"#475569"}}>Finanças · Receitas · Despesas</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* WORKSPACE */}
          {screen==="workspace"&&selCompany&&(
            <Workspace company={selCompany} area={selArea} companies={companies}/>
          )}

          {/* CEO VIEW */}
          {screen==="ceo"&&(
            <ConsolidatedView companies={companies} onSelectCompany={selectCompany}/>
          )}

          {/* PERSONAL */}
          {screen==="personal"&&<PersonalFinance/>}

          {/* MAXXXI GLOBAL */}
          {screen==="maxxxi_global"&&(
            <div style={{height:"calc(100vh - 120px)",display:"flex",flexDirection:"column",background:"#0f172a",borderRadius:12,border:"1px solid #1e293b",overflow:"hidden"}}>
              <MaxxxiAgent company={null} area={null} companies={companies}/>
            </div>
          )}
        </div>

        {/* FOOTER */}
        <div style={{padding:"8px 28px",borderTop:"1px solid #0a1021",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#0a1021"}}>
          <div style={{fontSize:9,color:"#1e293b",letterSpacing:"3px"}}>ORION ◆ PLATAFORMA DE GESTÃO EXECUTIVA</div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:9,color:"#1e293b"}}>MAXXXI ENGINE v1.0</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#22c55e"}}/>
              <span style={{fontSize:9,color:"#22c55e"}}>Sistema Operacional</span>
            </div>
          </div>
        </div>
      </div>

      {/* BRIEFING MODAL */}
      {briefingCompany&&<BriefingModal company={briefingCompany} onClose={()=>setBriefingCompany(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
