name: Sync to ORION
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORION_TOKEN }}
      - name: Push to ORION
        env:
          ORION_TOKEN: ${{ secrets.ORION_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add orion https://x-access-token:${ORION_TOKEN}@github.com/maxwellmachadoadm-ui/ORION.git || true
          git fetch orion main || true
          git push orion HEAD:main --force
