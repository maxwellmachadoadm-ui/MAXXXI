<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect width="180" height="180" rx="36" stroke="rgba(59,130,246,0.3)" stroke-width="1.5" fill="none"/>
  <!-- Lines -->
  <line x1="40"  y1="50"  x2="130" y2="50"   stroke="#3b82f6" stroke-width="2.2" stroke-opacity="0.55"/>
  <line x1="40"  y1="50"  x2="56"  y2="95"   stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="130" y1="50"  x2="124" y2="95"   stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.45"/>
  <line x1="56"  y1="95"  x2="90"  y2="90"   stroke="#60a5fa" stroke-width="2.8" stroke-opacity="0.75"/>
  <line x1="90"  y1="90"  x2="124" y2="95"   stroke="#60a5fa" stroke-width="2.8" stroke-opacity="0.75"/>
  <line x1="56"  y1="95"  x2="56"  y2="146"  stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.4"/>
  <line x1="124" y1="95"  x2="135" y2="146"  stroke="#3b82f6" stroke-width="1.8" stroke-opacity="0.4"/>
  <!-- Stars -->
  <circle cx="40"  cy="50"  r="8.5" fill="#fbbf24"/>
  <circle cx="40"  cy="50"  r="5"   fill="#fde68a"/>
  <circle cx="130" cy="50"  r="7"   fill="#93c5fd"/>
  <circle cx="56"  cy="95"  r="6"   fill="#93c5fd"/>
  <circle cx="90"  cy="90"  r="7.5" fill="#e0f2fe"/>
  <circle cx="124" cy="95"  r="6"   fill="#93c5fd"/>
  <!-- Rigel -->
  <circle cx="135" cy="146" r="13"  fill="url(#glow)" fill-opacity="0.3"/>
  <circle cx="135" cy="146" r="9.5" fill="#dbeafe"/>
  <circle cx="135" cy="146" r="4.5" fill="#ffffff"/>
  <!-- Saiph -->
  <circle cx="56"  cy="146" r="6.5" fill="#60a5fa"/>
  <!-- Tiny stars -->
  <circle cx="16"  cy="22"  r="1.5" fill="white" fill-opacity="0.25"/>
  <circle cx="158" cy="28"  r="1.5" fill="white" fill-opacity="0.2"/>
  <circle cx="164" cy="112" r="1.2" fill="white" fill-opacity="0.18"/>
  <circle cx="22"  cy="158" r="1.2" fill="white" fill-opacity="0.18"/>
</svg>
