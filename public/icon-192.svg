<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow-rigel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#dbeafe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <rect width="192" height="192" rx="38" stroke="rgba(59,130,246,0.3)" stroke-width="2" fill="none"/>

  <!-- Constellation lines -->
  <line x1="42"  y1="54"  x2="138" y2="54"   stroke="#3b82f6" stroke-width="2.5"  stroke-opacity="0.55"/>
  <line x1="42"  y1="54"  x2="60"  y2="102"  stroke="#3b82f6" stroke-width="2"    stroke-opacity="0.45"/>
  <line x1="138" y1="54"  x2="132" y2="102"  stroke="#3b82f6" stroke-width="2"    stroke-opacity="0.45"/>
  <line x1="60"  y1="102" x2="96"  y2="96"   stroke="#60a5fa" stroke-width="3"    stroke-opacity="0.75"/>
  <line x1="96"  y1="96"  x2="132" y2="102"  stroke="#60a5fa" stroke-width="3"    stroke-opacity="0.75"/>
  <line x1="60"  y1="102" x2="60"  y2="156"  stroke="#3b82f6" stroke-width="2"    stroke-opacity="0.4"/>
  <line x1="132" y1="102" x2="144" y2="156"  stroke="#3b82f6" stroke-width="2"    stroke-opacity="0.4"/>

  <!-- Stars -->
  <circle cx="42"  cy="54"  r="9"   fill="#93c5fd"/>
  <circle cx="138" cy="54"  r="7.5" fill="#60a5fa"/>
  <circle cx="60"  cy="102" r="6.5" fill="#93c5fd"/>
  <circle cx="96"  cy="96"  r="8"   fill="#e0f2fe"/>
  <circle cx="132" cy="102" r="6.5" fill="#93c5fd"/>
  <!-- Rigel (brilhante) -->
  <circle cx="144" cy="156" r="14"  fill="url(#glow-rigel)" fill-opacity="0.35"/>
  <circle cx="144" cy="156" r="10"  fill="#dbeafe"/>
  <circle cx="144" cy="156" r="5"   fill="#ffffff"/>
  <!-- Saiph -->
  <circle cx="60"  cy="156" r="7"   fill="#60a5fa"/>

  <!-- Background stars -->
  <circle cx="18"  cy="24"  r="1.8" fill="white" fill-opacity="0.28"/>
  <circle cx="168" cy="30"  r="1.8" fill="white" fill-opacity="0.22"/>
  <circle cx="174" cy="120" r="1.5" fill="white" fill-opacity="0.18"/>
  <circle cx="24"  cy="168" r="1.5" fill="white" fill-opacity="0.18"/>
  <circle cx="108" cy="18"  r="1.2" fill="white" fill-opacity="0.15"/>
  <circle cx="180" cy="72"  r="1.2" fill="white" fill-opacity="0.15"/>
</svg>
